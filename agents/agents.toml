# https://github.com/getsentry/dotagents
version = 1
agents = ["codex"]

[trust]
allow_all = true

[[skills]]
name = "dotagents"
source = "getsentry/dotagents"

[[mcp]]
name = "context7"
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[[mcp]]
name = "serena"
command = "uvx"
args = [
  "--from",
  "git+https://github.com/oraios/serena",
  "serena",
  "start-mcp-server",
]

[[skills]]
name = "beautiful-mermaid"
source = "path:skills/beautiful-mermaid"

[[skills]]
name = "find-skills"
source = "path:skills/find-skills"

[[skills]]
name = "promptify"
source = "path:skills/promptify"
