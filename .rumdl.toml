#:schema https://raw.githubusercontent.com/rvben/rumdl/refs/heads/main/rumdl.schema.json
# https://rumdl.dev/global-settings/
[global]
extend-enable = [ # "MD060", "MD063", "MD072", "MD073", "MD074"
  "MD060",
  "MD063",
]

# Markdown lint rules
# [rumdl/docs/rules.md at main · rvben/rumdl · GitHub](https://github.com/rvben/rumdl/blob/main/docs/rules.md)
enable = [
  # "MD001", # Heading increment
  # "MD003", # Heading style
  "MD004", # UL style
  # "MD005", # List indent
  # "MD007", # UL indent
  # "MD009", # No trailing spaces
  "MD010", # No hard tabs
  # "MD011", # Reversed link
  # "MD012", # No multiple blanks
  "MD013", # Line length  "MD013", # line-length - Line length
  # "MD014", # Commands show output
  "MD018", # No space atx
  # "MD019", # Multiple space atx
  # "MD020", # No space closed atx
  # "MD021", # Multiple space closed atx
  # "MD022", # Blanks around headings
  # "MD023", # Heading start left
  "MD024", # Multiple headings
  # "MD025", # Single title
  "MD026", # No trailing punctuation
  # "MD027", # Multiple spaces blockquote
  "MD028", # Blanks blockquote
  "MD029", # OL prefix
  # "MD030", # List marker space
  "MD031", # Blanks around fences
  # "MD032", # Blanks around lists
  "MD033", # No inline HTML
  # "MD034", # No bare URLs
  # "MD035", # HR style
  "MD036", # No emphasis as heading
  # "MD037", # Spaces around emphasis
  # "MD038", # No space in code
  # "MD039", # No space in links
  "MD040", # Fenced code language
  "MD041", # First line h1
  # "MD042", # No empty links
  # "MD043", # Required headings
  # "MD044", # Proper names
  "MD045", # No alt text
  # "MD046", # Code block style
  # "MD047", # File end newline
  # "MD048", # Code fence style
  # "MD049", # Emphasis style
  # "MD050", # Strong style
  # "MD051", # Link fragments
  # "MD052", # Reference links images
  "MD053", # Link image definitions
  # "MD054", # Link image style
  # "MD055", # Table pipe style
  # "MD056", # Table column count
  # "MD057", # Relative links
  "MD058", # Table spacing
  # "MD059", # Link text
  # "MD060", # Table format
  # "MD061", # Forbidden terms
  # "MD062", # Link destination space
  # "MD063", # Heading capitalization
  # "MD064", # No multiple consecutive spaces
  # "MD066", # Footnote validation
  # "MD067", # Footnote definition order
  # "MD068", # Empty footnote definitions
  # "MD069", # No duplicate list markers
  # "MD071", # Blank line after frontmatter
  # "MD072", # Frontmatter key sort
  # "MD073", # TOC validation
  # "MD074", # MkDocs nav validation
  # "MD075", # Orphaned table rows
  # "MD076", # List item spacing
  # "MD077", # List continuation indent
]
disable = []

[MD060]
style = "compact"

# [MD060]
# enabled = false              # Default: opt-in for conservative adoption
# style = "aligned"            # Options: "aligned", "aligned-no-space", "compact", "tight", "any"
# max-width = 0                # Default: inherit from MD013's line-length
# column-align = "auto"        # Options: "auto", "left", "center", "right"
# column-align-header = "auto" # Override alignment for header row only
# column-align-body = "auto"   # Override alignment for body rows only
# loose-last-column = false    # Cap last column at header width when true
